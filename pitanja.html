<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

        <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

    <!-- AOS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css"/>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <section class="mf-faq">
        
        <h2 class="mf-faq__title">FAQ</h2>
    </section>

    <section class="faq container">

        <div class="faq-item">
            <button class="faq-question">Mogu li kupiti ulaznice na ulazu?</button>
            <div class="faq-answer">
                Da, ali preporučujemo online kupnju.
            </div>
        </div>

        <div class="faq-item">
            <button class="faq-question">Smijem li dovesti djecu?</button>
            <div class="faq-answer">
                Da, uz pratnju odraslih.
            </div>
        </div>

    </section>

    <!-- SCRIPTS -->
    <script src="header.js"></script>
    <script>
        fetch("header.html")
        .then(res => res.text())
        .then(data => {
        document.getElementById("header-placeholder").innerHTML = data;
        });

        function toggleMenu(){
        document.getElementById("menu").classList.toggle("active");
        }
    </script>

    <script>
        const items = document.querySelectorAll(".faq-item");

        items.forEach(item => {
            const question = item.querySelector(".faq-question");

            question.addEventListener("click", () => {

                // zatvori sve ostale
                items.forEach(i => {
                if (i !== item) {
                    i.classList.remove("active");
                }
                });

                // toggle trenutni
                item.classList.toggle("active");
            });
        });
    </script>
</body>
</html>
