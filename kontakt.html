<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt</title>

        <!-- Bootstrap -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.6.2/dist/css/bootstrap.min.css">

    <!-- Swiper -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"/>

    <!-- AOS -->
    <link rel="stylesheet" href="https://unpkg.com/aos@2.3.4/dist/aos.css"/>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="header-placeholder"></div>

    <section class="contact-section" data-aos="fade-up">
        <div class="container">
            <h2>Kontakt</h2>
            <p>Za sve upite vezane uz Meet For Speed, slobodno nas kontaktirajte putem e-maila ili pratite na društvenim mrežama.</p>

            <div class="contact-grid">
                <div class="contact-info">
                    <h3>Organizatori</h3>
                    <ul>
                        <li>Auto Club XYZ</li>
                        <li>Speed Events d.o.o.</li>
                        <li>Motorsport Team HR</li>
                    </ul>
                    <h3>Email</h3>
                    <p><a href="mailto:info@meetforspeed.hr">info@meetforspeed.hr</a></p>
                </div>

                <div class="socials">
                    <h3>Prati nas</h3>
                    <div class="social-icons">
                        <a href="https://www.facebook.com/meetforspeed" target="_blank"><img src="img/facebook.svg" alt="Facebook"></a>
                        <a href="https://www.instagram.com/meetforspeed" target="_blank"><img src="img/instagram.svg" alt="Instagram"></a>
                        <a href="https://www.youtube.com/meetforspeed" target="_blank"><img src="img/youtube.svg" alt="YouTube"></a>
                        <a href="https://www.linkedin.com/company/meetforspeed" target="_blank"><img src="img/linkedin.svg" alt="LinkedIn"></a>
                    </div>
                </div>

                <div class="contact-form">
                    <h3>Pošalji nam poruku</h3>
                    <form>
                        <input type="text" placeholder="Ime i prezime" required>
                        <input type="email" placeholder="Email" required>
                        <textarea placeholder="Poruka" required></textarea>
                        <button type="submit" class="cta">Pošalji</button>
                    </form>
                </div>
            </div>
        </div>
    </section>

    <script src="https://unpkg.com/aos@2.3.4/dist/aos.js"></script>
    <script>

        document.addEventListener("DOMContentLoaded", function() {
            AOS.init();
        });


        fetch("header.html")
        .then(res => res.text())
        .then(data => {
        document.getElementById("header-placeholder").innerHTML = data;
        });

        function toggleMenu(){
        document.getElementById("menu").classList.toggle("active");
        }
    </script>
</body>
</html>
